<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SE Scorecard — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { background: #0a0f1e; font-family: ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col items-center justify-center px-4">

  <div class="text-center mb-8">
    <p class="text-xs text-blue-400 font-bold tracking-widest uppercase mb-3">DSR Sales Engineering</p>
    <h1 class="text-3xl font-black text-white tracking-tight">SE Scorecard</h1>
  </div>

  <div class="w-full max-w-sm bg-white/5 border border-white/10 rounded-2xl p-8">

    {% if error %}
    <div class="mb-5 bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-3 text-sm text-red-300">
      {{ error }}
    </div>
    {% endif %}

    <p class="text-sm text-gray-400 text-center mb-6">Sign in with your Twilio Google account to continue.</p>

    <a href="/auth"
      class="flex items-center justify-center gap-3 w-full py-3 rounded-xl bg-white hover:bg-gray-100 transition-colors">
      <svg class="w-5 h-5" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85l6.09-6.09C34.46 3.05 29.52 1 24 1 14.82 1 7.07 6.48 3.58 14.18l7.09 5.51C12.28 13.36 17.67 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.46 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.64c-.55 2.96-2.2 5.47-4.68 7.16l7.19 5.59C43.44 37.28 46.46 31.36 46.46 24.5z"/>
        <path fill="#FBBC05" d="M10.67 28.31A14.6 14.6 0 0 1 9.5 24c0-1.49.26-2.93.7-4.31l-7.09-5.51A23.94 23.94 0 0 0 0 24c0 3.87.93 7.53 2.58 10.76l8.09-6.45z"/>
        <path fill="#34A853" d="M24 47c5.52 0 10.15-1.83 13.53-4.96l-7.19-5.59C28.6 38.27 26.42 39 24 39c-6.33 0-11.72-3.86-13.33-9.19l-8.09 6.45C6.07 43.52 14.42 47 24 47z"/>
      </svg>
      <span class="text-gray-800 font-semibold text-sm">Sign in with Google</span>
    </a>

    <p class="text-xs text-gray-600 text-center mt-4">Only @twilio.com accounts are allowed.</p>

  </div>

<script>history.replaceState(null, '', '/')</script>
</body>
</html>
