<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SE Scorecard — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root { --red: #E8003D; --dark: #0d0005; --panel: #180009; --yellow: #FFD600; }
* { box-sizing: border-box; }
body {
  background: var(--dark);
  font-family: 'Rajdhani', ui-sans-serif, system-ui, sans-serif;
  background-image: radial-gradient(circle, rgba(232,0,61,0.15) 1px, transparent 1px);
  background-size: 22px 22px;
  min-height: 100vh;
  overflow-x: hidden;
  color: white;
}
.p5-corner-panel {
  background: var(--panel);
  border: 1px solid rgba(232,0,61,0.2);
  border-left: 4px solid var(--red);
  position: relative;
  overflow: hidden;
}
.p5-corner-panel::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  border-style: solid;
  border-width: 0 20px 20px 0;
  border-color: transparent var(--dark) transparent transparent;
  z-index: 1;
}
.p5-badge {
  display: inline-block;
  background: var(--red);
  color: white;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  padding: 3px 18px 3px 12px;
  font-size: 11px;
  clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
}
.p5-rule {
  height: 3px;
  background: linear-gradient(90deg, var(--red), transparent);
  transform: skewX(-20deg);
  transform-origin: left;
}
.p5-noise {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  mix-blend-mode: overlay;
}
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-4 relative">

  <!-- Top/bottom red bars -->
  <div style="position:fixed;top:0;left:0;right:0;height:4px;background:var(--red);z-index:100;box-shadow:0 0 12px var(--red)"></div>
  <div style="position:fixed;bottom:0;left:0;right:0;height:4px;background:var(--red);z-index:100;box-shadow:0 0 12px var(--red)"></div>

  <!-- Decorative big number -->
  <div style="position:fixed;bottom:-30px;right:-10px;font-size:280px;font-weight:900;font-style:italic;color:rgba(232,0,61,0.05);line-height:1;pointer-events:none;user-select:none;transform:skewX(-5deg)">5</div>

  <!-- Corner decorations -->
  <div style="position:fixed;top:16px;left:16px;width:24px;height:24px;border-top:3px solid var(--red);border-left:3px solid var(--red)"></div>
  <div style="position:fixed;top:16px;right:16px;width:24px;height:24px;border-top:3px solid var(--red);border-right:3px solid var(--red)"></div>
  <div style="position:fixed;bottom:16px;left:16px;width:24px;height:24px;border-bottom:3px solid var(--red);border-left:3px solid var(--red)"></div>
  <div style="position:fixed;bottom:16px;right:16px;width:24px;height:24px;border-bottom:3px solid var(--red);border-right:3px solid var(--red)"></div>

  <div class="w-full max-w-sm relative" style="z-index:10">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="p5-badge mb-4">DSR Sales Engineering</div>
      <h1 style="font-size:52px;font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:-0.02em;line-height:0.9;text-shadow:4px 4px 0 var(--red)">
        SE<br>SCORE<span style="color:var(--red)">CARD</span>
      </h1>
      <div style="width:80px;height:4px;background:var(--red);transform:skewX(-20deg);margin:14px auto 0;box-shadow:0 0 8px var(--red)"></div>
    </div>

    <!-- Panel -->
    <div class="p5-corner-panel" style="padding:28px 24px">
      <div class="p5-noise"></div>

      {% if error %}
      <div style="background:rgba(232,0,61,0.12);border:1px solid rgba(232,0,61,0.5);border-left:4px solid var(--red);padding:10px 14px;margin-bottom:20px;font-size:14px;color:#ff7070;font-weight:700;font-style:italic">
        ⚠ {{ error }}
      </div>
      {% endif %}

      <div style="margin-bottom:20px;position:relative;z-index:1">
        <div class="p5-badge" style="font-size:10px;margin-bottom:10px">Access Required</div>
        <p style="color:rgba(255,255,255,0.45);font-size:14px;font-weight:500;margin-top:8px">
          Sign in with your Twilio Google account to continue.
        </p>
      </div>

      <a href="/auth" style="position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;background:white;text-decoration:none;cursor:pointer;transition:all 0.15s;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%)"
         onmouseover="this.style.filter='brightness(0.88)';this.style.transform='translateX(3px)'"
         onmouseout="this.style.filter='';this.style.transform=''">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85l6.09-6.09C34.46 3.05 29.52 1 24 1 14.82 1 7.07 6.48 3.58 14.18l7.09 5.51C12.28 13.36 17.67 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.46 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.64c-.55 2.96-2.2 5.47-4.68 7.16l7.19 5.59C43.44 37.28 46.46 31.36 46.46 24.5z"/>
          <path fill="#FBBC05" d="M10.67 28.31A14.6 14.6 0 0 1 9.5 24c0-1.49.26-2.93.7-4.31l-7.09-5.51A23.94 23.94 0 0 0 0 24c0 3.87.93 7.53 2.58 10.76l8.09-6.45z"/>
          <path fill="#34A853" d="M24 47c5.52 0 10.15-1.83 13.53-4.96l-7.19-5.59C28.6 38.27 26.42 39 24 39c-6.33 0-11.72-3.86-13.33-9.19l-8.09 6.45C6.07 43.52 14.42 47 24 47z"/>
        </svg>
        <span style="color:#111;font-weight:700;font-size:14px;font-style:italic;letter-spacing:0.1em;text-transform:uppercase">Sign in with Google</span>
      </a>

      <p style="position:relative;z-index:1;font-size:11px;color:rgba(255,255,255,0.2);text-align:center;margin-top:14px;font-weight:600;letter-spacing:0.12em">◆ @TWILIO.COM ACCOUNTS ONLY ◆</p>
    </div>

  </div>
</body>
</html>
