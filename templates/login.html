<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SE Scorecard — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { background: #0a0f1e; font-family: ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col items-center justify-center px-4">

  <div class="text-center mb-8">
    <p class="text-xs text-blue-400 font-bold tracking-widest uppercase mb-3">DSR Sales Engineering</p>
    <h1 class="text-3xl font-black text-white tracking-tight">SE Scorecard</h1>
  </div>

  <div class="w-full max-w-sm bg-white/5 border border-white/10 rounded-2xl p-8">

    {% if error %}
    <div class="mb-5 bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-3 text-sm text-red-300">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <label class="block text-xs text-gray-400 uppercase tracking-widest mb-2">Password</label>
      <input
        type="password"
        name="password"
        autofocus
        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-blue-500 mb-4"
        placeholder="Enter password"
      >
      <button type="submit"
        class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm transition-colors">
        Sign in
      </button>
    </form>

  </div>

</body>
</html>
